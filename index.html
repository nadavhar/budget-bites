    // ============================================================
    // ============================================================
    // Supabase — init
    // ============================================================
    function initSupabase() {
      if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      supabaseClient.auth.onAuthStateChange((_event, session) => {
        currentUser = session?.user ?? null;
        updateAuthBtn();
      });
      supabaseClient.auth.getSession().then(({ data: { session } }) => {
        currentUser = session?.user ?? null;
        updateAuthBtn();
      });
    }

    // ============================================================
    // Auth
    // ============================================================
    function updateAuthBtn() {
      const btn = $('auth-btn');
      if (!btn) return;
      if (currentUser) {
        const initial = (currentUser.email || '?')[0].toUpperCase();
        btn.innerHTML = `<span class="auth-avatar">${initial}</span><span>${esc(t().authSignOut)}</span>`;
      } else {
        btn.textContent = t().authSignIn;
      }
      updateFeedFab();
    }

    function updateFeedFab() {
      const fab = $('feed-compose-btn');
      if (!fab) return;
      fab.style.display = feedVisible ? 'flex' : 'none';
    }

    function handleAuthBtnClick() {
      if (currentUser) {
        supabaseClient.auth.signOut();
        showToast(lang === 'he' ? 'להתראות 👋' : 'Signed out 👋');
      } else {
        openAuthModal('login');
      }
    }

    function openAuthModal(mode) {
      authMode = mode || 'login';
      renderAuthModal();
      $('auth-error').classList.remove('visible');
      $('auth-email').value = '';
      $('auth-password').value = '';
      $('auth-username').value = '';
      $('auth-overlay').classList.add('open');
    }

    function closeAuthModal() {
      $('auth-overlay').classList.remove('open');
    }

    function renderAuthModal() {
      const isLogin = authMode === 'login';
      $('auth-modal-title').textContent  = isLogin ? t().authSignIn : t().authSignUp;
      $('auth-submit').textContent       = isLogin ? t().authSignIn : t().authSignUp;
      $('auth-email-label').textContent  = t().authEmail;
      $('auth-password-label').textContent = t().authPassword;
      $('auth-username-label').textContent = t().authUsername;
      $('auth-username-field').style.display = isLogin ? 'none' : '';
      $('auth-toggle-text').textContent  = isLogin ? t().authNoAccount : t().authHasAccount;
      $('auth-toggle-btn').textContent   = isLogin ? t().authSignUp : t().authSignIn;
    }

    async function handleAuthSubmit() {
      const email    = $('auth-email').value.trim();
      const password = $('auth-password').value;
      const errEl    = $('auth-error');
      errEl.classList.remove('visible');

      if (!email || !password) {
        errEl.textContent = lang === 'he' ? 'יש למלא אימייל וסיסמה' : 'Please enter email and password';
        errEl.classList.add('visible');
        return;
      }

      $('auth-submit').disabled = true;
      try {
        let result;
        if (authMode === 'login') {
          result = await supabaseClient.auth.signInWithPassword({ email, password });
        } else {
          const username = $('auth-username').value.trim();
          result = await supabaseClient.auth.signUp({
            email, password,
            options: {
              data: { username },
              emailRedirectTo: 'https://nadavhar.github.io/budget-bites/',
            }
          });
        }
        if (result.error) throw result.error;
        closeAuthModal();
        // signUp returns a user but no session until email is confirmed
        if (authMode === 'signup' && !result.data.session) {
          showToast(lang === 'he' ? '📧 שלחנו לך אימייל אישור — בדוק את תיבת הדואר' : '📧 Check your email to confirm your account');
        } else {
          showToast(t().authWelcome);
          if (pendingReviewId) {
            const rid = pendingReviewId;
            pendingReviewId = null;
            openReviewSheet(rid);
          }
        }
      } catch (err) {
        errEl.textContent = err.message || (lang === 'he' ? 'שגיאה, נסה שוב' : 'Error, please try again');
        errEl.classList.add('visible');
      } finally {
        $('auth-submit').disabled = false;
      }
    }

    // ============================================================
    // Reviews
    // ============================================================
    function openReviewSheet(restaurantId) {
      if (!supabaseClient) {
        showToast(lang === 'he' ? 'יש להגדיר Supabase תחילה' : 'Supabase not configured');
        return;
      }
      if (!currentUser) {
        pendingReviewId = restaurantId;
        openAuthModal('login');
        return;
      }
      reviewRestaurantId = restaurantId;
      selectedRating     = 0;

      const restaurant = data.find(r => r.id === restaurantId);
      $('review-rest-name').textContent    = restaurant ? l(restaurant.name) : '';
      $('review-sheet-title').textContent  = t().reviewTitle;
      $('review-text').value               = '';
      $('review-text').placeholder         = t().reviewPlaceholder;
      $('review-char-count').textContent   = '0 / 150';
      $('anon-toggle').checked             = true;
      $('anon-label').textContent          = t().reviewAnonLabel;
      $('anon-desc').textContent           = t().reviewAnonDesc;
      $('review-submit-btn').textContent   = t().reviewSubmit;
      $('review-submit-btn').disabled      = false;
      updateStarSelector(0);

      $('review-overlay').classList.add('open');
      $('review-sheet').classList.add('open');
    }

    function closeReviewSheet() {
      $('review-overlay').classList.remove('open');
      $('review-sheet').classList.remove('open');
      reviewRestaurantId = null;
      selectedRating     = 0;
    }

    function updateStarSelector(rating) {
      $('star-selector').querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.star) <= rating);
      });
    }

    async function submitReview() {
      if (!selectedRating) {
        showToast(t().reviewSelectStar);
        return;
      }
      const btn = $('review-submit-btn');
      btn.disabled = true;
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const token = session?.access_token;
        const res = await fetch(EDGE_FN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            restaurant_id: reviewRestaurantId,
            rating: selectedRating,
            text: $('review-text').value.trim() || null,
            is_anonymous: $('anon-toggle').checked,
          })
        });
        const result = await res.json();
        if (!res.ok) {
          const msg = result.error === 'already_reviewed' ? t().reviewAlready
                    : result.error === 'rate_limit'       ? t().reviewRateLimit
                    : result.error;
          throw new Error(msg);
        }
        delete reviewsCache[reviewRestaurantId];
        closeReviewSheet();
        showToast(t().reviewThanks);
        loadReviewsForVisible();
      } catch (err) {
        showToast(err.message);
        btn.disabled = false;
      }
    }

    async function loadReviewsForVisible() {
      if (!supabaseClient) return;
      const cards = document.querySelectorAll('.card-rating[data-rid]');
      const ids   = [...new Set([...cards].map(c => c.dataset.rid))];
      if (!ids.length) return;

      const { data: rows } = await supabaseClient
        .from('public_reviews')
        .select('restaurant_id, rating, text, is_anonymous, created_at')
        .in('restaurant_id', ids);
      if (!rows) return;

      const byId = {};
      for (const row of rows) {
        (byId[row.restaurant_id] = byId[row.restaurant_id] || []).push(row);
      }

      for (const id of ids) {
        const rRows = byId[id] || [];
        const avg   = rRows.length ? rRows.reduce((s, r) => s + r.rating, 0) / rRows.length : 0;
        reviewsCache[id] = { avg, count: rRows.length, reviews: rRows.slice(0, 5) };
        updateCardRating(id);
      }
    }

    function starStr(rating) {
      const full = Math.round(rating);
      return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

    function updateCardRating(restaurantId) {
      const el = document.querySelector(`.card-rating[data-rid="${restaurantId}"]`);
      if (!el) return;
      const cached = reviewsCache[restaurantId];

      if (!cached || cached.count === 0) {
        el.innerHTML = `<button class="card-rating-btn" onclick="openReviewSheet('${restaurantId}')">${esc(t().reviewRateBtn)}</button>`;
        return;
      }

      const { avg, count, reviews } = cached;
      const reviewsHtml = reviews.map(r => {
        const author = r.is_anonymous ? esc(t().reviewAnonymous) : (lang === 'he' ? 'משתמש רשום' : 'Member');
        const date   = new Date(r.created_at).toLocaleDateString(lang === 'he' ? 'he-IL' : 'en-US', { day: 'numeric', month: 'short' });
        const text   = r.text ? `<div class="review-item-text">${esc(r.text)}</div>` : '';
        return `<div class="review-item">
          <div class="review-item-header">
            <span class="review-item-stars">${'★'.repeat(r.rating)}</span>
            <span class="review-item-author">${author}</span>
            <span class="review-item-date">${esc(date)}</span>
          </div>${text}
        </div>`;
      }).join('');

      el.innerHTML = `
        <span class="card-rating-stars">${starStr(avg)}</span>
        <span class="card-rating-score">${avg.toFixed(1)}</span>
        <span class="card-rating-count">(${count})</span>
        <button class="card-rating-btn" onclick="openReviewSheet('${restaurantId}')">${esc(t().reviewAddBtn)}</button>
        <button class="card-rating-btn" onclick="toggleReviews('${restaurantId}')">${esc(t().reviewsBtn)}</button>
        <div class="card-reviews" id="reviews-${restaurantId}">${reviewsHtml}</div>`;
    }

    function toggleReviews(restaurantId) {
      const el = $(`reviews-${restaurantId}`);
      if (el) el.classList.toggle('open');
    }

    // ============================================================
    // Feed
    // ============================================================
    function toggleFeed() {
      feedVisible = !feedVisible;
      const btn = $('feed-toggle-btn');
      btn.classList.toggle('active', feedVisible);
      btn.textContent = feedVisible ? `✕ ${lang === 'he' ? 'פיד' : 'Feed'}` : t().feedTab;
      $('feed-wrap').style.display = feedVisible ? 'block' : 'none';
      $('grid').style.display      = feedVisible ? 'none'  : '';
      updateFeedFab();
      if (feedVisible) {
        if (mapVisible) toggleMapView(); // close map when feed opens
        loadFeed();
        subscribeFeed();
      } else {
        unsubscribeFeed();
      }
    }

    async function loadFeed() {
      if (!supabaseClient) return;
      const { data: rows } = await supabaseClient
        .from('public_feed_posts')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);
      feedPosts = rows || [];
      renderFeed();
    }

    function renderFeed() {
      const listEl  = $('feed-list');
      const emptyEl = $('feed-empty');
      if (!feedPosts.length) {
        listEl.innerHTML = '';
        emptyEl.style.display = 'block';
        $('feed-empty-text').textContent = t().feedEmpty;
        return;
      }
      emptyEl.style.display = 'none';
      listEl.innerHTML = feedPosts.map(post => buildFeedCard(post, false)).join('');
    }

    function timeAgo(dateStr) {
      const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 60)    return lang === 'he' ? 'עכשיו'        : 'just now';
      if (diff < 3600)  return `${Math.floor(diff / 60)}  ${lang === 'he' ? 'דק׳'  : 'min ago'}`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} ${lang === 'he' ? 'שע׳'  : 'hr ago'}`;
      return `${Math.floor(diff / 86400)} ${lang === 'he' ? 'ימים' : 'd ago'}`;
    }

    function buildFeedCard(post, isNew) {
      const restaurant = data.find(r => r.id === post.restaurant_id);
      if (!restaurant) return '';
      const authorText = t().feedAnonymousAuthor;
      const timeStr    = timeAgo(post.created_at);
      const name       = esc(l(restaurant.name));
      const cat        = esc(l(restaurant.category));
      const city       = esc(l(restaurant.location.city));
      const photo      = getCategoryPhoto(restaurant.category.en);
      const tipHtml    = post.tip ? `<div class="feed-card-tip">"${esc(post.tip)}"</div>` : '';
      return `<div class="feed-card${isNew ? ' new' : ''}">
        <div class="feed-card-author">${authorText} · ${esc(timeStr)}</div>
        <div class="feed-card-restaurant">
          <img class="feed-card-photo" src="${photo}" alt="${name}" loading="lazy">
          <div class="feed-card-info">
            <div class="feed-card-name">${name}</div>
            <div class="feed-card-meta">${cat} · ${restaurant.price} \u20AA · ${city}</div>
          </div>
          <span class="price-badge">${restaurant.price} \u20AA</span>
        </div>
        ${tipHtml}
      </div>`;
    }

    function handleNewFeedPost(payload) {
      if (!feedVisible) return;
      const post = payload.new;
      if (!post || !post.id) {
        // RLS blocked full payload — reload from view
        loadFeed();
        return;
      }
      feedPosts.unshift(post);
      $('feed-empty').style.display = 'none';
      $('feed-list').insertAdjacentHTML('afterbegin', buildFeedCard(post, true));
    }

    function subscribeFeed() {
      if (!supabaseClient || feedChannel) return;
      feedChannel = supabaseClient
        .channel('feed-realtime')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'feed_posts' }, handleNewFeedPost)
        .subscribe();
    }

    function unsubscribeFeed() {
      if (feedChannel && supabaseClient) {
        supabaseClient.removeChannel(feedChannel);
        feedChannel = null;
      }
    }

    // ── Post composer ─────────────────────────────────────────
    function openPostSheet() {
      postRestaurantId = null;
      $('post-rest-input').value = '';
      $('post-rest-results').classList.remove('open');
      $('post-rest-selected').classList.remove('visible');
      $('post-tip').value = '';
      $('post-char-count').textContent = '0 / 150';
      $('post-anon-toggle').checked = true;
      $('post-submit-btn').disabled = false;
      $('post-sheet-title').textContent   = t().feedComposeTitle;
      $('post-rest-input').placeholder    = t().feedRestaurantSearch;
      $('post-tip').placeholder           = t().feedTipPlaceholder;
      $('post-anon-label').textContent    = t().feedAnonLabel;
      $('post-anon-desc').textContent     = t().feedAnonDesc;
      $('post-submit-btn').textContent    = t().feedSubmit;
      // Guests are always anonymous — hide the toggle
      document.querySelector('#post-sheet .anon-toggle-row').style.display = currentUser ? '' : 'none';
      $('post-overlay').classList.add('open');
      $('post-sheet').classList.add('open');
      setTimeout(() => $('post-rest-input').focus(), 350);
    }

    function closePostSheet() {
      $('post-overlay').classList.remove('open');
      $('post-sheet').classList.remove('open');
      postRestaurantId = null;
    }

    function searchRestaurants(q) {
      if (!q.trim()) {
        $('post-rest-results').classList.remove('open');
        return;
      }
      const lower   = q.toLowerCase();
      const matches = data.filter(r =>
        l(r.name).toLowerCase().includes(lower) ||
        l(r.location.city).toLowerCase().includes(lower)
      ).slice(0, 8);
      if (!matches.length) {
        $('post-rest-results').classList.remove('open');
        return;
      }
      $('post-rest-results').innerHTML = matches.map(r =>
        `<div class="post-rest-option" data-id="${esc(r.id)}">
          ${esc(l(r.name))} <span style="color:var(--text-muted);font-size:0.8em">— ${esc(l(r.location.city))}</span>
        </div>`
      ).join('');
      $('post-rest-results').classList.add('open');
    }

    function selectRestaurant(id) {
      const restaurant = data.find(r => r.id === id);
      if (!restaurant) return;
      postRestaurantId = id;
      $('post-rest-input').value = '';
      $('post-rest-results').classList.remove('open');
      $('post-rest-selected-name').textContent = l(restaurant.name);
      $('post-rest-selected').classList.add('visible');
    }

    async function submitPost() {
      if (!postRestaurantId) {
        showToast(t().feedNoRestaurant);
        return;
      }
      const btn = $('post-submit-btn');
      btn.disabled = true;
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const token = session?.access_token;
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(EDGE_POST_URL, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            restaurant_id: postRestaurantId,
            tip:           $('post-tip').value.trim() || null,
            is_anonymous:  $('post-anon-toggle').checked,
          })
        });
        const result = await res.json();
        if (!res.ok) {
          const msg = result.error === 'rate_limit' ? t().feedRateLimit : result.error;
          throw new Error(msg);
        }
        closePostSheet();
        showToast(t().feedPosted);
      } catch (err) {
        showToast(err.message);
        btn.disabled = false;
      }
    }

    // ============================================================
    // Init
    // ============================================================
    async function init() {
      try {
        const res = await fetch("data/restaurants_i18n.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
        buildOptions();
        setLang(lang);
      } catch (err) {
        console.error("Failed to load restaurant data:", err);
        showToast("שגיאה בטעינת הנתונים. נסה לרענן את הדף.");
      }
      initSupabase();
      updateAuthBtn();
    }

    // Auth button
    $('auth-btn').addEventListener('click', handleAuthBtnClick);
    $('auth-close').addEventListener('click', closeAuthModal);
    $('auth-overlay').addEventListener('click', e => { if (e.target === $('auth-overlay')) closeAuthModal(); });
    $('auth-submit').addEventListener('click', handleAuthSubmit);
    $('auth-toggle-btn').addEventListener('click', () => {
      authMode = authMode === 'login' ? 'signup' : 'login';
      renderAuthModal();
      $('auth-error').classList.remove('visible');
    });
    ['auth-email', 'auth-password', 'auth-username'].forEach(id => {
      $(id).addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSubmit(); });
    });

    // Feed
    $('feed-toggle-btn').addEventListener('click', toggleFeed);
    $('feed-compose-btn').addEventListener('click', openPostSheet);
    $('post-overlay').addEventListener('click', closePostSheet);
    $('post-submit-btn').addEventListener('click', submitPost);
    $('post-rest-clear').addEventListener('click', () => {
      postRestaurantId = null;
      $('post-rest-selected').classList.remove('visible');
      $('post-rest-input').focus();
    });
    $('post-rest-input').addEventListener('input', e => searchRestaurants(e.target.value));
    $('post-rest-results').addEventListener('click', e => {
      const opt = e.target.closest('.post-rest-option');
      if (opt) selectRestaurant(opt.dataset.id);
    });
    $('post-tip').addEventListener('input', e => {
      $('post-char-count').textContent = `${e.target.value.length} / 150`;
    });

    // Review sheet
    $('review-overlay').addEventListener('click', closeReviewSheet);
    $('review-submit-btn').addEventListener('click', submitReview);
    $('review-text').addEventListener('input', e => {
      $('review-char-count').textContent = `${e.target.value.length} / 150`;
    });
    $('star-selector').addEventListener('click', e => {
      const btn = e.target.closest('button[data-star]');
      if (!btn) return;
      selectedRating = parseInt(btn.dataset.star);
      updateStarSelector(selectedRating);
    });

    init();
  </script>
</body>
</html>
